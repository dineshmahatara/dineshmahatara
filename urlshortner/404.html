<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Routing Pipeline...</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding-top: 50px; color: #333; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div>
    <div class="spinner"></div>
    <h2>Connecting to Routing Engine...</h2>
  </div>

  <script>
    // 1. UPDATE TO YOUR NEW LIVE WEB APP DEPLOYMENT URL
    const APPS_SCRIPT_API = "https://script.google.com/macros/s/AKfycbwYOUR_SCRIPT_ID_HERE/exec";
    
    const path = window.location.pathname;
    const segments = path.split('/').filter(Boolean);
    
    // If there is a slug immediately following the domain (e.g., dineshmc.com.np/onlinekhabar)
    if (segments.length === 1) {
      const slug = segments[0];
      // Forward straight to Google Apps Script redirection handler
      window.location.href = APPS_SCRIPT_API + "?p=" + encodeURIComponent(slug);
    } else {
      // Fallback directly to the dashboard root home
      window.location.href = "https://www.dineshmc.com.np/urlshortner/";
    }
  </script>
</body>
</html>
