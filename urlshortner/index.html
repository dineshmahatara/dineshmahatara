<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitly Clone Premium Hub Framework</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --b-navy: #0c101d; --b-orange: #ee6123; --b-blue: #2a5bd7; --b-bg: #f4f6fa; }
    body { background-color: var(--b-bg); font-family: system-ui, sans-serif; color: var(--b-navy); }
    .bitly-nav { background-color: var(--b-navy); padding: 14px 0; border-bottom: 3px solid var(--b-orange); }
    .creation-canvas { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(12,16,29,0.05); padding: 30px; margin-top: 25px; border: 1px solid #e1e4ea; }
    .metric-card { background: #fff; border: 1px solid #e1e4ea; border-radius: 10px; padding: 20px; position: relative; }
    .metric-card::before { content: ''; position: absolute; top:0; left:0; width:4px; height:100%; background: var(--b-blue); }
    .dashboard-view { display: none; }
    .link-row-card { background: #fff; border: 1px solid #e1e4ea; border-radius: 8px; margin-bottom: 12px; padding: 18px; }
    .tag-badge { background-color: #e8edfa; color: var(--b-blue); font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 4px; }
    .qr-thumb { width: 44px; height: 44px; cursor: pointer; border: 1px solid #e1e4ea; padding: 3px; border-radius: 6px; }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(244,246,250,0.85); display:flex; justify-content:center; align-items:center; z-index:9999; }
    .edit-drawer { background-color: #f8f9fa; border-top: 1px dashed #ddd; margin-top: 12px; padding-top: 12px; display: none; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay"><div class="spinner-border text-primary"></div></div>

  <nav class="navbar navbar-expand-lg navbar-dark bitly-nav">
    <div class="container">
      <a class="navbar-brand fw-bold text-white" href="#" onclick="goHome()"><i class="bi bi-box-arrow-up-right text-warning me-2"></i>Bitly<span class="text-warning">Clone</span></a>
      <div class="d-flex align-items-center">
        <div id="navAuthSection">
          <button class="btn btn-sm text-white-50 me-2" onclick="showAuthPage('login')">Log In</button>
          <button class="btn btn-sm btn-warning pt-1 pb-1 px-3" onclick="showAuthPage('register')">Sign Up Free</button>
        </div>
        <div id="navUserSection" style="display: none;">
          <span class="navbar-text text-white me-3" id="sessionIdentity"></span>
          <button class="btn btn-sm btn-outline-danger border-0" onclick="logout()"><i class="bi bi-power"></i> Log Out</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    <div class="card creation-canvas">
      <form onsubmit="createNewLink(event)">
        <div class="row g-3">
          <div class="col-lg-6"><input type="url" id="longUrl" class="form-control form-control-lg" placeholder="Paste your target destination long URL here" required></div>
          <div class="col-lg-3"><input type="text" id="shortCode" class="form-control form-control-lg" placeholder="Custom alias (optional)"></div>
          <div class="col-lg-3"><button type="submit" class="btn btn-primary btn-lg w-100"><i class="bi bi-plus-circle"></i> Create Link</button></div>
        </div>
      </form>
      <div id="anonSuccessResult" class="mt-3 p-3 bg-light rounded border border-primary d-none">
        <span class="text-primary fw-bold d-block small">Short link configured:</span>
        <div class="d-flex justify-content-between align-items-center mt-1">
          <a id="anonShortLink" href="#" target="_blank" class="fw-bold fs-5 text-dark text-decoration-none"></a>
          <button class="btn btn-sm btn-dark" onclick="copyAnonLink()">Copy</button>
        </div>
      </div>
    </div>

    <div id="authView" class="card mx-auto mt-4 p-4 bg-white border shadow-sm" style="max-width: 400px; display: none; border-radius: 12px;">
      <ul class="nav nav-pills nav-justified mb-3">
        <li class="nav-item"><button id="tab-login" class="nav-link active" onclick="switchAuthMode('login')">Login</button></li>
        <li class="nav-item"><button id="tab-register" class="nav-link" onclick="switchAuthMode('register')">Register</button></li>
      </ul>
      <form onsubmit="handleAuth(event)">
        <div class="mb-3"><label class="form-label small fw-bold">Email address</label><input type="email" id="authEmail" class="form-control" required></div>
        <div class="mb-3"><label class="form-label small fw-bold">Password</label><input type="password" id="authPassword" class="form-control" required></div>
        <button type="submit" id="authSubmitBtn" class="btn btn-primary w-100">Proceed</button>
      </form>
    </div>

    <div id="dashboardView" class="dashboard-view mt-4">
      <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="metric-card"><h6>Account Tier</h6><h3 class="mb-0 fw-bold text-primary" id="currentTierText">Free</h3></div></div>
        <div class="col-md-4"><div class="metric-card"><h6>Total Mapped Links</h6><h3 class="mb-0 fw-bold" id="statGlobalLinks">0</h3></div></div>
        <div class="col-md-4"><div class="metric-card"><h6>Cumulative Traffic Metrics</h6><h3 class="mb-0 fw-bold text-success" id="statGlobalClicks">0</h3></div></div>
      </div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div id="pricingPlanCard" class="card p-4 bg-white border border-light-subtle mb-4">
            <h6 class="fw-bold text-uppercase small text-muted border-bottom pb-2 mb-3">Subscribe to Premium</h6>
            <div class="d-grid gap-2">
              <button class="btn btn-sm btn-outline-primary text-start p-2" onclick="requestPlanUpgrade('Monthly ($9/mo)')"><i class="bi bi-calendar-event me-2"></i>Subscribe Monthly</button>
              <button class="btn btn-sm btn-outline-success text-start p-2" onclick="requestPlanUpgrade('Yearly ($89/yr)')"><i class="bi bi-calendar-check me-2"></i>Subscribe Yearly</button>
            </div>
          </div>
          <div class="card p-4 bg-white border border-light-subtle">
            <h6 class="fw-bold text-uppercase small text-muted border-bottom pb-2 mb-2">Account Key Security</h6>
            <form onsubmit="changePassword(event)">
              <input type="password" id="newPassword" class="form-control form-control-sm mb-2" placeholder="New secret password" required>
              <button type="submit" class="btn btn-sm btn-dark w-100">Update Password</button>
            </form>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold m-0">Shortlink Connections Feed Stream</h5>
            <span class="text-muted small" id="totalLinksCounterSummary">0 Mapped Vectors</span>
          </div>
          
          <div id="linksFeedContainer"></div>

          <nav class="mt-4 d-flex justify-content-between align-items-center">
            <button id="btnPrevPage" class="btn btn-sm btn-outline-secondary px-3" onclick="changePage(-1)"><i class="bi bi-chevron-left"></i> Previous</button>
            <span id="paginationInfoLabel" class="small fw-semibold text-secondary font-monospace">Page 1 of 1</span>
            <button id="btnNextPage" class="btn btn-sm btn-outline-secondary px-3" onclick="changePage(1)">Next <i class="bi bi-chevron-right"></i></button>
          </nav>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="qrModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content text-center p-4">
        <h6 class="fw-bold text-muted mb-2 small text-uppercase">Link Asset QR</h6>
        <img id="modalQrImg" src="" class="img-fluid rounded border p-2 mb-3 bg-white">
        <button type="button" class="btn btn-sm btn-secondary w-100" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 1. PLACE YOUR ACTIVE WEB APP DEPLOYMENT URL HERE
    const APPS_SCRIPT_API = "https://script.google.com/macros/s/AKfycbwrHLUDsAzEGYB-fPMx2OejDC-SiXo2u3Q8u-JbYXTZEhwx0Yf53Ty2t7u5_c_0CfTy/exec";
    let AUTH_MODE = 'login';
    let CURRENT_PAGE = 1;
    const ITEMS_PER_PAGE = 5;
    let TOTAL_PAGES = 1;

    document.addEventListener("DOMContentLoaded", () => {
      const cachedUser = localStorage.getItem("dineshmc_session");
      if (cachedUser) { establishSession(JSON.parse(cachedUser)); } else { showLoader(false); }
    });

    function showLoader(visible) { document.getElementById('loader').style.display = visible ? 'flex' : 'none'; }
    function goHome() { window.location.reload(); }
    function showAuthPage(mode) { document.getElementById('dashboardView').style.display = 'none'; document.getElementById('authView').style.display = 'block'; switchAuthMode(mode); }
    function switchAuthMode(mode) { AUTH_MODE = mode; document.getElementById('tab-login').classList.toggle('active', mode === 'login'); document.getElementById('tab-register').classList.toggle('active', mode === 'register'); document.getElementById('authSubmitBtn').innerText = mode === 'login' ? 'Sign In' : 'Register Account'; }

    function runGas(functionName, args, success, failure) {
      const callbackName = 'gas_cb_' + Math.round(100000 * Math.random());
      window[callbackName] = function(data) {
        delete window[callbackName]; document.getElementById(callbackName).remove();
        if (data && data.error) { if (failure) failure(data.error); } else { if (success) success(data); }
      };
      const src = `${APPS_SCRIPT_API}?callback=${callbackName}&function=${functionName}&args=${encodeURIComponent(JSON.stringify(args))}`;
      const script = document.createElement('script'); script.id = callbackName; script.src = src;
      document.body.appendChild(script);
    }

    function handleAuth(e) {
      e.preventDefault(); showLoader(true);
      const email = document.getElementById('authEmail').value;
      const pass = document.getElementById('authPassword').value;
      const func = AUTH_MODE === 'login' ? 'loginUser' : 'registerUser';
      runGas(func, [email, pass], (user) => { localStorage.setItem("dineshmc_session", JSON.stringify(user)); establishSession(user); }, (err) => { showLoader(false); alert(err); });
    }

    function establishSession(user) {
      document.getElementById('authView').style.display = 'none';
      document.getElementById('navAuthSection').style.display = 'none';
      document.getElementById('navUserSection').style.display = 'block';
      document.getElementById('dashboardView').style.display = 'block';
      document.getElementById('sessionIdentity').innerHTML = `<i class="bi bi-person-circle text-warning me-1"></i> ${user.email}`;
      document.getElementById('currentTierText').innerText = user.tier;
      if(user.tier !== 'Free') { document.getElementById('pricingPlanCard').style.display = 'none'; }
      fetchRenderWorkspace();
    }

    function fetchRenderWorkspace() {
      showLoader(true);
      const user = JSON.parse(localStorage.getItem("dineshmc_session"));
      
      runGas('getDashboardData', [user.email, user.tier, CURRENT_PAGE, ITEMS_PER_PAGE], (data) => {
        document.getElementById('statGlobalLinks').innerText = data.adminStats.globalLinks;
        document.getElementById('statGlobalClicks').innerText = data.adminStats.globalClicks;
        document.getElementById('totalLinksCounterSummary').innerText = `${data.pagination.totalItems} Managed Pointers`;

        TOTAL_PAGES = data.pagination.totalPages || 1;
        document.getElementById('paginationInfoLabel').innerText = `Page ${CURRENT_PAGE} of ${TOTAL_PAGES}`;
        document.getElementById('btnPrevPage').disabled = (CURRENT_PAGE <= 1);
        document.getElementById('btnNextPage').disabled = (CURRENT_PAGE >= TOTAL_PAGES);

        const feed = document.getElementById('linksFeedContainer');
        feed.innerHTML = data.links.length === 0 ? '<div class="p-5 text-center bg-white border rounded-3 text-muted">No links configured here.</div>' : '';
        
        data.links.forEach((link, idx) => {
          const statusBadge = link.status === "Inactive" ? 'bg-danger' : 'bg-success';
          const toggleIcon = link.status === "Inactive" ? 'bi-play-fill' : 'bi-pause-fill';
          const toggleText = link.status === "Inactive" ? 'Activate' : 'Deactivate';
          const toggleBtnClass = link.status === "Inactive" ? 'btn-outline-success' : 'btn-outline-warning';

          feed.innerHTML += `
            <div class="link-row-card">
              <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div style="max-width: 70%;">
                  <span class="tag-badge me-1"><i class="bi bi-tag"></i> ${link.tier}</span>
                  <span class="badge ${statusBadge} font-monospace rounded mb-1" id="badge-status-${link.shortCode}">${link.status}</span>
                  <h6 class="fw-bold mb-1 mt-1"><a href="${link.shortUrl}" target="_blank" class="text-decoration-none text-dark">/urlshortner/${link.shortCode}</a></h6>
                  <div class="text-secondary small text-truncate" id="display-long-${link.shortCode}" style="max-width:400px;">${link.longUrl}</div>
                </div>
                <div class="d-flex align-items-center gap-2 ms-auto">
                  <span class="badge bg-light text-dark border p-2 font-monospace">${link.clicks} Clicks</span>
                  <img src="${link.qrUrl}" class="qr-thumb" onclick="openQrModal('${link.qrUrl}')">
                  <button class="btn btn-sm btn-outline-primary" onclick="toggleEditDrawer('${link.shortCode}')"><i class="bi bi-pencil"></i> Edit</button>
                  <button class="btn btn-sm ${toggleBtnClass}" onclick="toggleLinkStatus('${link.shortCode}', '${link.longUrl}', '${link.status}')"><i class="bi ${toggleIcon}"></i> ${toggleText}</button>
                  <button class="btn btn-sm btn-outline-danger border-0" onclick="purgeLink('${link.shortCode}')"><i class="bi bi-trash"></i></button>
                </div>
              </div>
              
              <div class="edit-drawer" id="drawer-${link.shortCode}">
                <div class="row g-2">
                  <div class="col-md-9">
                    <input type="url" class="form-control form-control-sm" id="input-edit-long-${link.shortCode}" value="${link.longUrl}" placeholder="Update Destination Link Location URL">
                  </div>
                  <div class="col-md-3 d-flex gap-1">
                    <button class="btn btn-sm btn-success w-100" onclick="saveLinkEdits('${link.shortCode}', '${link.status}')">Save Changes</button>
                    <button class="btn btn-sm btn-light border" onclick="toggleEditDrawer('${link.shortCode}')">Cancel</button>
                  </div>
                </div>
              </div>
            </div>`;
        });
        showLoader(false);
      });
    }

    function toggleEditDrawer(code) {
      const drawer = document.getElementById(`drawer-${code}`);
      drawer.style.display = drawer.style.display === "block" ? "none" : "block";
    }

    function saveLinkEdits(code, currentStatus) {
      const newLongUrl = document.getElementById(`input-edit-long-${code}`).value;
      if(!newLongUrl) return alert("Destination target string URL address cannot be empty values.");
      
      showLoader(true);
      const user = JSON.parse(localStorage.getItem("dineshmc_session"));
      runGas('updateLinkDetails', [code, newLongUrl, currentStatus, user.email, user.tier], () => {
        toggleEditDrawer(code);
        fetchRenderWorkspace();
      }, (err) => { showLoader(false); alert(err); });
    }

    function toggleLinkStatus(code, longUrl, currentStatus) {
      const nextStatus = currentStatus === "Inactive" ? "Active" : "Inactive";
      showLoader(true);
      const user = JSON.parse(localStorage.getItem("dineshmc_session"));
      runGas('updateLinkDetails', [code, longUrl, nextStatus, user.email, user.tier], () => {
        fetchRenderWorkspace();
      }, (err) => { showLoader(false); alert(err); });
    }

    function changePage(direction) {
      const nextTarget = CURRENT_PAGE + direction;
      if (nextTarget >= 1 && nextTarget <= TOTAL_PAGES) { CURRENT_PAGE = nextTarget; fetchRenderWorkspace(); }
    }

    function createNewLink(e) {
      e.preventDefault(); showLoader(true);
      const cachedUser = localStorage.getItem("dineshmc_session");
      const longUrl = document.getElementById('longUrl').value;
      let shortCode = document.getElementById('shortCode').value || Math.random().toString(36).substring(2, 7);
      const email = cachedUser ? JSON.parse(cachedUser).email : "anonymous@dineshmc.com.np";
      const tier = cachedUser ? JSON.parse(cachedUser).tier : "Free";

      runGas('saveLink', [shortCode, longUrl, tier, email], () => {
        const fullShortUrl = `https://www.dineshmc.com.np/urlshortner/${shortCode}`;
        document.getElementById('anonShortLink').innerText = `dineshmc.com.np/urlshortner/${shortCode}`;
        document.getElementById('anonShortLink').href = fullShortUrl;
        document.getElementById('anonSuccessResult').classList.remove('d-none');
        document.getElementById('longUrl').value = ''; document.getElementById('shortCode').value = '';
        if (cachedUser) { fetchRenderWorkspace(); } else { showLoader(false); }
      }, (err) => { showLoader(false); alert(err); });
    }

    function requestPlanUpgrade(p) { if(confirm(`Confirm routing transaction verification requests for ${p}?`)) { showLoader(true); const user = JSON.parse(localStorage.getItem("dineshmc_session")); runGas('submitSubscriptionRequest', [user.email, p], () => { showLoader(false); alert("Request registered."); }); } }
    function changePassword(e) { e.preventDefault(); showLoader(true); const user = JSON.parse(localStorage.getItem("dineshmc_session")); runGas('updatePassword', [user.email, document.getElementById('newPassword').value], () => { showLoader(false); document.getElementById('newPassword').value = ''; alert("Key updated."); }); }
    function purgeLink(code) { if(confirm("Purge link vector configurations completely?")) { showLoader(true); const user = JSON.parse(localStorage.getItem("dineshmc_session")); runGas('deleteLink', [code, user.email, user.tier], () => { fetchRenderWorkspace(); }); } }
    function openQrModal(url) { document.getElementById('modalQrImg').src = url; new bootstrap.Modal(document.getElementById('qrModal')).show(); }
    function copyAnonLink() { navigator.clipboard.writeText(document.getElementById('anonShortLink').href).then(() => alert("Copied path string.")); }
    function logout() { localStorage.removeItem("dineshmc_session"); window.location.reload(); }
  </script>
</body>
</html>
