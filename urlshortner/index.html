<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DineshMC Advanced Link Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; font-family: system-ui, sans-serif; }
    .auth-card { max-width: 420px; margin: 80px auto; border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .dashboard-view { display: none; }
    .qr-thumb { width: 38px; height: 38px; cursor: pointer; border: 1px solid #ddd; padding: 2px; border-radius: 4px; }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:flex; justify-content:center; align-items:center; z-index:9999; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay"><div class="spinner-border text-primary"></div></div>

  <div id="authView" class="container" style="display: none;">
    <div class="card auth-card p-4 bg-white">
      <div class="text-center mb-4">
        <h3 class="fw-bold text-primary"><i class="bi bi-link-45deg"></i> dineshmc.com.np</h3>
        <p class="text-muted small">Link Hub Security Gateway</p>
      </div>
      <ul class="nav nav-pills nav-justified mb-3">
        <li class="nav-item"><button id="tab-login" class="nav-link active" onclick="switchAuthMode('login')">Sign In</button></li>
        <li class="nav-item"><button id="tab-register" class="nav-link" onclick="switchAuthMode('register')">Register</button></li>
      </ul>
      <form id="authForm" onsubmit="handleAuth(event)">
        <div class="mb-3"><label class="form-label">Email</label><input type="email" id="authEmail" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Password</label><input type="password" id="authPassword" class="form-control" required></div>
        <button type="submit" id="authSubmitBtn" class="btn btn-primary w-100 py-2">Authenticate</button>
      </form>
    </div>
  </div>

  <div id="dashboardView" class="dashboard-view">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-lightning-charge-fill text-warning me-2"></i>Link Engine</a>
        <div class="d-flex align-items-center">
          <span class="navbar-text text-white me-3" id="sessionIdentity"></span>
          <button class="btn btn-sm btn-outline-danger" onclick="logout()">Sign Out</button>
        </div>
      </div>
    </nav>

    <div class="container my-4">
      <div id="adminAnalyticsSection" class="row g-3 mb-4 d-none">
        <div class="col-md-6"><div class="card p-3 bg-primary text-white"><h6>Global Active Links</h6><h2 class="mb-0 fw-bold" id="statGlobalLinks">0</h2></div></div>
        <div class="col-md-6"><div class="card p-3 bg-dark text-white"><h6>Global Trafficked Clicks</h6><h2 class="mb-0 fw-bold text-warning" id="statGlobalClicks">0</h2></div></div>
      </div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card p-4 bg-white shadow-sm mb-4">
            <h5 class="fw-bold mb-3">Deploy Short Redirect</h5>
            <form onsubmit="createNewLink(event)">
              <div class="mb-3">
                <label class="form-label small fw-bold">Short Code (e.g., onlinekhabar)</label>
                <input type="text" id="shortCode" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold">Destination Long URL</label>
                <input type="url" id="longUrl" class="form-control" placeholder="https://..." required>
              </div>
              <button type="submit" class="btn btn-success w-100">Deploy Live Link</button>
            </form>
          </div>

          <div class="card p-4 bg-white shadow-sm mb-4">
            <h5 class="fw-bold mb-3">Account Workspace Controls</h5>
            <div class="mb-3">
              <label class="small fw-bold d-block mb-1">Subscription Class</label>
              <div class="d-flex justify-content-between align-items-center border p-2 rounded bg-light">
                <span id="currentTierText" class="fw-bold text-uppercase">Free Tier</span>
                <button id="upgradeBtn" class="btn btn-sm btn-warning fw-bold" onclick="upgradeSubscription()">Upgrade to Premium</button>
              </div>
            </div>
            <hr>
            <h6 class="fw-bold text-muted mb-2">Modify Security Credentials</h6>
            <form onsubmit="changePassword(event)">
              <div class="mb-2"><input type="password" id="newPassword" class="form-control form-control-sm" placeholder="New Secret Password" required></div>
              <button type="submit" class="btn btn-sm btn-outline-primary w-100">Apply New Password</button>
            </form>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card p-4 bg-white shadow-sm">
            <h5 class="fw-bold mb-3">Active Cluster Endpoints</h5>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr><th>Pointer Location</th><th>Tracking</th><th>QR</th><th class="text-end">Purge</th></tr>
                </thead>
                <tbody id="linksTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="qrModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content text-center p-4">
        <img id="modalQrImg" src="" class="img-fluid rounded mb-3">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const APPS_SCRIPT_API = "https://script.google.com/macros/s/AKfycbziZrenRdexGEONud-UztD-vIYgszaqDLrM8vupaLpSMkPO9W92flRvzFTBQWBQ7KC6/exec";
    let AUTH_MODE = 'login';

    // Core Lifecycle Loop: Checks LocalStorage for active sessions on load
    document.addEventListener("DOMContentLoaded", () => {
      const cachedUser = localStorage.getItem("dineshmc_session");
      if (cachedUser) {
        establishSession(JSON.parse(cachedUser));
      } else {
        showLoader(false);
        document.getElementById('authView').style.display = 'block';
      }
    });

    function showLoader(visible) { document.getElementById('loader').style.display = visible ? 'flex' : 'none'; }
    
    function switchAuthMode(mode) {
      AUTH_MODE = mode;
      document.getElementById('tab-login').classList.toggle('active', mode === 'login');
      document.getElementById('tab-register').classList.toggle('active', mode === 'register');
      document.getElementById('authSubmitBtn').innerText = mode === 'login' ? 'Authenticate' : 'Register';
    }

    // Cross-Domain Safe Messaging Framework 
    function runGas(functionName, args, success, failure) {
      const callbackName = 'gas_cb_' + Math.round(100000 * Math.random());
      window[callbackName] = function(data) {
        delete window[callbackName];
        document.getElementById(callbackName).remove();
        if (data && data.error) { if (failure) failure(data.error); } else { if (success) success(data); }
      };
      const src = `${APPS_SCRIPT_API}?callback=${callbackName}&function=${functionName}&args=${encodeURIComponent(JSON.stringify(args))}`;
      const script = document.createElement('script'); script.id = callbackName; script.src = src;
      document.body.appendChild(script);
    }

    function handleAuth(e) {
      e.preventDefault();
      showLoader(true);
      const email = document.getElementById('authEmail').value;
      const pass = document.getElementById('authPassword').value;
      const func = AUTH_MODE === 'login' ? 'loginUser' : 'registerUser';

      runGas(func, [email, pass], (user) => {
        localStorage.setItem("dineshmc_session", JSON.stringify(user)); // Store session persistence state
        establishSession(user);
      }, (err) => { showLoader(false); alert("Auth Failure: " + err); });
    }

    function establishSession(user) {
      document.getElementById('authView').style.display = 'none';
      document.getElementById('dashboardView').style.display = 'block';
      document.getElementById('sessionIdentity').innerHTML = `<i class="bi bi-person-circle text-info me-1"></i> ${user.email}`;
      document.getElementById('currentTierText').innerText = `${user.tier} Tier`;
      
      // Hide upgrade tools if context is already Premium or Administrator
      if (user.tier !== 'Free') document.getElementById('upgradeBtn').style.display = 'none';
      if (user.tier === 'Admin') document.getElementById('adminAnalyticsSection').classList.remove('d-none');
      
      fetchRenderWorkspace(user);
    }

    function fetchRenderWorkspace(user) {
      showLoader(true);
      runGas('getDashboardData', [user.email, user.tier], (data) => {
        if(user.tier === 'Admin') {
          document.getElementById('statGlobalLinks').innerText = data.adminStats.globalLinks;
          document.getElementById('statGlobalClicks').innerText = data.adminStats.globalClicks;
        }
        const tbody = document.getElementById('linksTableBody');
        tbody.innerHTML = '';
        
        data.links.forEach(link => {
          tbody.innerHTML += `
            <tr>
              <td>
                <a href="${link.shortUrl}" target="_blank" class="fw-bold text-decoration-none">${link.domainPointer}</a>
                <div class="text-muted text-truncate small" style="max-width: 320px;">${link.longUrl}</div>
              </td>
              <td><span class="badge bg-light text-dark border"><i class="bi bi-graph-up text-success me-1"></i>${link.clicks} clicks</span></td>
              <td><img src="${link.qrUrl}" class="qr-thumb" onclick="openQrModal('${link.qrUrl}')"></td>
              <td class="text-end"><button class="btn btn-sm btn-outline-danger" onclick="purgeLink('${link.shortCode}')"><i class="bi bi-trash"></i></button></td>
            </tr>`;
        });
        showLoader(false);
      });
    }

    function createNewLink(e) {
      e.preventDefault();
      showLoader(true);
      const user = JSON.parse(localStorage.getItem("dineshmc_session"));
      const code = document.getElementById('shortCode').value;
      const longUrl = document.getElementById('longUrl').value;

      runGas('saveLink', [code, longUrl, user.tier, user.email], () => {
        document.getElementById('shortCode').value = '';
        document.getElementById('longUrl').value = '';
        fetchRenderWorkspace(user);
      }, (err) => { showLoader(false); alert("Error creating link: " + err); });
    }

    function changePassword(e) {
      e.preventDefault();
      showLoader(true);
      const user = JSON.parse(localStorage.getItem("dineshmc_session"));
      const newPass = document.getElementById('newPassword').value;

      runGas('updatePassword', [user.email, newPass], () => {
        showLoader(false);
        document.getElementById('newPassword').value = '';
        alert("Password updated securely across database cluster nodes.");
      }, (err) => { showLoader(false); alert(err); });
    }

    function upgradeSubscription() {
      if(confirm("Confirm upgrading account deployment profile to Premium status tier?")) {
        showLoader(true);
        const user = JSON.parse(localStorage.getItem("dineshmc_session"));
        runGas('upgradeToPremium', [user.email], (updatedUser) => {
          localStorage.setItem("dineshmc_session", JSON.stringify(updatedUser));
          establishSession(updatedUser);
          alert("Account updated successfully!");
        });
      }
    }

    function purgeLink(code) {
      if(confirm("Purge endpoint validation routing index?")) {
        showLoader(true);
        const user = JSON.parse(localStorage.getItem("dineshmc_session"));
        runGas('deleteLink', [code, user.email, user.tier], () => { fetchRenderWorkspace(user); });
      }
    }

    function openQrModal(url) {
      document.getElementById('modalQrImg').src = url;
      new bootstrap.Modal(document.getElementById('qrModal')).show();
    }

    function logout() {
      localStorage.removeItem("dineshmc_session");
      window.location.reload();
    }
  </script>
</body>
</html>
