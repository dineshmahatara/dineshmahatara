<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Routing Core...</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding-top: 50px; color: #333; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #0d6efd; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div>
    <div class="spinner"></div>
    <h2>Connecting to Redirect Engine...</h2>
    <p>Please wait while we forward you safely.</p>
  </div>

  <script>
    // 1. MUST MATCH YOUR GOOGLE APPS SCRIPT WEB APP DEPLOYMENT URL
    const APPS_SCRIPT_API = "https://script.google.com/macros/s/AKfycbziZrenRdexGEONud-UztD-vIYgszaqDLrM8vupaLpSMkPO9W92flRvzFTBQWBQ7KC6/exec";
    
    const path = window.location.pathname; // Captures "/ok122" or "/urlshortner/ok122"
    const segments = path.split('/').filter(Boolean);
    
    if (segments.length > 0) {
      // Grab the last item in the URL string as your shortcode slug
      const slug = segments[segments.length - 1];
      
      // If the user was just trying to open the dashboard manager home, let them through
      if (slug === 'urlshortner') {
        window.location.href = "https://www.dineshmc.com.np/urlshortner/index.html";
      } else {
        // Execute the Google Apps Script background tracking redirect pipeline
        window.location.href = APPS_SCRIPT_API + "?p=" + encodeURIComponent(slug);
      }
    } else {
      // Fallback directly back to your main personal profile website homepage
      window.location.href = "https://www.dineshmc.com.np/";
    }
  </script>
</body>
</html>
