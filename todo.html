<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevents Google Indexing -->
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CRM Pro v14</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; }
        body { background: #f1f5f9; font-family: 'Inter', system-ui; font-size: 0.82rem; }
        .hidden { display: none !important; }
        #authOverlay { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 1.5rem; width: 380px; }
        .nav-header { background: var(--primary); color: white; padding: 1rem 2rem; }
        .data-card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        th { cursor: pointer; background: #f8fafc !important; font-size: 0.7rem; color: #64748b; }
        .locked-row { background-color: #f8fafc; color: #94a3b8; }
        .date-input { border: none; background: transparent; font-size: 0.75rem; width: 115px; outline: none; }
        .date-input:focus { border-bottom: 1px solid var(--accent); }
        .days-badge { min-width: 70px; font-weight: 600; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card shadow-lg text-center">
        <h3 class="fw-bold mb-1">CRM Core</h3>
        <p class="text-muted small mb-4">Internal System Access</p>
        <input type="text" id="userIn" class="form-control mb-2" placeholder="Username">
        <input type="password" id="passIn" class="form-control mb-4" placeholder="Password">
        <button class="btn btn-primary w-100 fw-bold" onclick="handleLogin()">Sign In</button>
        <div id="authError" class="alert alert-danger p-2 mt-3 small hidden">Access Denied</div>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="nav-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-bold">🚀 SYSTEM PORTAL</h5>
        <div class="d-flex align-items-center gap-3">
            <span id="userBadge" class="badge bg-primary border border-light py-2 px-3"></span>
            <button class="btn btn-sm btn-outline-light rounded-pill" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container-fluid p-4">
        <div class="row g-4 mb-4">
            <div class="col-lg-3">
                <div class="data-card p-3 h-100 text-center">
                    <h6 class="small fw-bold text-muted mb-2">WORKFLOW ANALYTICS</h6>
                    <div style="height:140px"><canvas id="statusChart"></canvas></div>
                </div>
            </div>
            <div class="col-lg-9">
                <div class="data-card p-4">
                    <h6 class="fw-bold text-primary mb-3 text-uppercase">New Task Entry</h6>
                    <div class="row g-2">
                        <div class="col-md-4"><input id="task" class="form-control" placeholder="Task Name (Supports Unicode)"></div>
                        <div class="col-md-2"><label class="small text-muted">Assigned</label><input id="assignDate" type="date" class="form-control"></div>
                        <div class="col-md-2"><label class="small text-muted">Target</label><input id="targetDate" type="date" class="form-control"></div>
                        <div class="col-md-2"><label class="small text-muted">Status</label><select id="status" class="form-select"><option>Pending</option><option>In Progress</option><option>Done</option></select></div>
                        <div class="col-md-2 d-flex align-items-end"><button class="btn btn-primary w-100 fw-bold" onclick="create()">Save</button></div>
                        <div class="col-md-8 mt-2"><input id="note" class="form-control" placeholder="Detailed notes..."></div>
                        <div class="col-md-2 mt-2"><select id="priority" class="form-select"><option>Low</option><option>Medium</option><option>High</option></select></div>
                        <div class="col-md-2 mt-2"><select id="type" class="form-select"><option>Official</option><option>Personal</option></select></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
            <input id="search" class="form-control shadow-sm w-25" placeholder="🔍 Search..." onkeyup="render()">
            <select id="fStatus" class="form-select shadow-sm w-auto" onchange="render()"><option value="">All Status</option><option>Pending</option><option>In Progress</option><option>Done</option></select>
            <select id="fUser" class="form-select shadow-sm w-auto" onchange="render()"><option value="">All Owners</option></select>
            
            <div class="ms-auto d-flex gap-2">
                <button id="bulkDelBtn" class="btn btn-danger btn-sm hidden" onclick="deleteSelected()">🗑 Delete Selected</button>
                <div class="btn-group shadow-sm">
                    <button class="btn btn-light border btn-sm" onclick="exportExcel()">Excel</button>
                    <button class="btn btn-light border btn-sm" onclick="exportPDF()">PDF</button>
                    <button class="btn btn-light border btn-sm" onclick="load()">🔄 Refresh</button>
                </div>
            </div>
        </div>

        <div class="data-card overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width:40px" class="text-center"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>
                            <th onclick="sortData('task')">Task Detail ↕</th>
                            <th onclick="sortData('assignDate')">Assign ↕</th>
                            <th onclick="sortData('targetDate')">Target ↕</th>
                            <th>Status / Priority</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div class="p-3 bg-light d-flex justify-content-between align-items-center">
                <div id="pageMeta" class="small fw-bold text-muted"></div>
                <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
            </div>
        </div>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbynWXpfbL8QfGYue5bcIZHjXyPspZPlERSHkhWV2B_lRNlzQrV5eI-Vd43gt78XzyywSg/exec"; // Replace with your actual Web App URL
let tasks = [], curUser = null, curRole = null, chart = null;
let curPage = 1, pageSize = 10, sortCol = 'row', sortAsc = true;

// Helper to fix date inputs
function formatToDateInput(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return isNaN(d.getTime()) ? '' : d.toISOString().split('T')[0];
}

function calculateDays(target) {
    if (!target) return '-';
    const diff = new Date(target) - new Date().setHours(0,0,0,0);
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function boot() {
    curUser = localStorage.getItem('active_user');
    curRole = localStorage.getItem('user_role');
    if (curUser) {
        document.getElementById('authOverlay').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userBadge').innerText = `${curUser.toUpperCase()} (${curRole.toUpperCase()})`;
        document.getElementById('assignDate').valueAsDate = new Date();
        document.getElementById('targetDate').valueAsDate = new Date();
        load();
    }
}

async function handleLogin() {
    const u = document.getElementById('userIn').value;
    const p = document.getElementById('passIn').value;
    const res = await fetch(API, { method: "POST", body: JSON.stringify({ action: "login", username: u, password: p }) });
    const data = await res.json();
    if (data.status === "success") {
        localStorage.setItem('active_user', u);
        localStorage.setItem('user_role', data.role.toLowerCase());
        location.reload();
    } else { document.getElementById('authError').classList.remove('hidden'); }
}

function logout() { localStorage.clear(); location.reload(); }

async function load() {
    const r = await fetch(API);
    tasks = await r.json();
    populateUserFilter();
    render();
    updateChart();
}

function populateUserFilter() {
    const users = [...new Set(tasks.map(t => t.createdBy))];
    const select = document.getElementById('fUser');
    select.innerHTML = '<option value="">All Owners</option>' + users.map(u => `<option value="${u}">${u}</option>`).join('');
}

function create() {
    const t = document.getElementById('task');
    if (!t.value) return;
    const payload = {
        action: "create", task: t.value, 
        assignDate: document.getElementById('assignDate').value,
        targetDate: document.getElementById('targetDate').value,
        status: document.getElementById('status').value,
        priority: document.getElementById('priority').value, 
        type: document.getElementById('type').value,
        note: document.getElementById('note').value, createdBy: curUser 
    };
    fetch(API, {method:"POST", body:JSON.stringify(payload)}).then(() => { 
        t.value=""; document.getElementById('note').value=""; load(); 
    });
}

function render() {
    let d = [...tasks];
    const q = document.getElementById('search').value.toLowerCase();
    const fs = document.getElementById('fStatus').value;
    const fu = document.getElementById('fUser').value;

    if (q) d = d.filter(x => x.task?.toLowerCase().includes(q) || x.note?.toLowerCase().includes(q));
    if (fs) d = d.filter(x => x.status === fs);
    if (fu) d = d.filter(x => x.createdBy === fu);

    d.sort((a,b) => {
        let vA = a[sortCol], vB = b[sortCol];
        return sortAsc ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
    });

    const visible = d.slice((curPage - 1) * pageSize, curPage * pageSize);
    document.getElementById('pageMeta').innerText = `DATA: ${d.length} RECORDS`;
    
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = visible.map(t => {
        const canEdit = (curRole === 'admin' || t.createdBy === curUser);
        const daysLeft = calculateDays(t.targetDate);
        const dayClass = daysLeft < 0 ? 'bg-danger' : (daysLeft <= 2 ? 'bg-warning text-dark' : 'bg-success');

        return `
        <tr class="${!canEdit ? 'locked-row' : ''}">
            <td class="text-center"><input type="checkbox" class="task-check" value="${t.row}" ${!canEdit ? 'disabled' : 'onclick="updateBulkBtn()"'}></td>
            <td>
                <input class="form-control form-control-sm border-0 bg-transparent fw-bold p-0" value="${t.task || ''}" ${!canEdit ? 'disabled' : ''} onchange="updateRow(${t.row}, this.value, 'task')">
                <input class="form-control form-control-sm border-0 bg-transparent text-muted p-0 small" value="${t.note || ''}" placeholder="Note..." ${!canEdit ? 'disabled' : ''} onchange="updateRow(${t.row}, this.value, 'note')">
                <div class="small text-primary mt-1">${t.type} | By: ${t.createdBy}</div>
            </td>
            <td><input type="date" class="date-input" value="${formatToDateInput(t.assignDate)}" ${!canEdit ? 'disabled' : ''} onchange="updateRow(${t.row}, this.value, 'assignDate')"></td>
            <td>
                <input type="date" class="date-input" value="${formatToDateInput(t.targetDate)}" ${!canEdit ? 'disabled' : ''} onchange="updateRow(${t.row}, this.value, 'targetDate')">
                <div class="mt-1"><span class="badge ${dayClass} days-badge">${daysLeft} Days</span></div>
            </td>
            <td>
                <select class="form-select form-select-sm border-0 bg-transparent p-0 mb-1" ${!canEdit ? 'disabled' : ''} onchange="updateRow(${t.row}, this.value, 'status')">
                    <option ${t.status==='Pending'?'selected':''}>Pending</option>
                    <option ${t.status==='In Progress'?'selected':''}>In Progress</option>
                    <option ${t.status==='Done'?'selected':''}>Done</option>
                </select>
                <select class="form-select form-select-sm border-0 bg-transparent p-0 fw-bold text-accent" ${!canEdit ? 'disabled' : ''} onchange="updateRow(${t.row}, this.value, 'priority')">
                    <option ${t.priority==='Low'?'selected':''}>Low</option>
                    <option ${t.priority==='Medium'?'selected':''}>Medium</option>
                    <option ${t.priority==='High'?'selected':''}>High</option>
                </select>
            </td>
            <td class="text-center">${canEdit ? `<button class="btn btn-sm text-danger" onclick="del(${t.row})">🗑</button>` : '🔒'}</td>
        </tr>`;
    }).join('');
    renderPagination(Math.ceil(d.length / pageSize) || 1);
    updateBulkBtn();
}

function toggleSelectAll(master) {
    document.querySelectorAll('.task-check:not(:disabled)').forEach(c => c.checked = master.checked);
    updateBulkBtn();
}

function updateBulkBtn() {
    const selected = document.querySelectorAll('.task-check:checked').length;
    document.getElementById('bulkDelBtn').classList.toggle('hidden', selected === 0);
}

async function deleteSelected() {
    const ids = Array.from(document.querySelectorAll('.task-check:checked')).map(c => c.value);
    if(!confirm(`Delete ${ids.length} items?`)) return;
    for(let row of ids) await fetch(API, {method:"POST", body:JSON.stringify({action:"delete", row})});
    load();
}

function renderPagination(total) {
    const p = document.getElementById('pagination');
    let html = '';
    for(let i=1; i<=total; i++) html += `<li class="page-item ${curPage === i ? 'active' : ''}"><a class="page-link" onclick="curPage=${i};render()">${i}</a></li>`;
    p.innerHTML = html;
}

function sortData(col) {
    if(sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    render();
}

async function updateRow(row, val, field) {
    const t = tasks.find(x => x.row === row);
    t[field] = val;
    await fetch(API, {method:"POST", body:JSON.stringify({action:"update", ...t})});
    if(field === 'targetDate' || field === 'status') render();
    updateChart();
}

async function del(row) {
    if(!confirm("Are you sure?")) return;
    await fetch(API, {method:"POST", body:JSON.stringify({action:"delete", row})});
    load();
}

function updateChart() {
    const counts = tasks.reduce((acc, t) => { acc[t.status] = (acc[t.status] || 0) + 1; return acc; }, {});
    const ctx = document.getElementById('statusChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(counts),
            datasets: [{ data: Object.values(counts), backgroundColor: ['#f59e0b', '#3b82f6', '#10b981'], borderWeight: 0 }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } } }
    });
}

function exportExcel() {
    const ws = XLSX.utils.json_to_sheet(tasks);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Tasks");
    XLSX.writeFile(wb, "CRM_Data.xlsx");
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l');
    doc.autoTable({ head: [['Task', 'Target', 'Status', 'Owner']], body: tasks.map(x => [x.task, x.targetDate, x.status, x.createdBy]) });
    doc.save("Report.pdf");
}

boot();
</script>
</body>
</html>
