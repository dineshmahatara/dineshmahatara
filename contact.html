<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Contact Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding: 10px; background: #f4f6f8; }
h2 { text-align: center; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

.dropdown {
  position: relative;
}

.dropdown-btn {
  padding: 8px;
  background: #007bff;
  color: white;
  cursor: pointer;
}

.dropdown-content {
  display: none;
  position: absolute;
  background: white;
  border: 1px solid #ccc;
  max-height: 200px;
  overflow-y: auto;
  z-index: 1;
}

.dropdown-content label {
  display: block;
  padding: 5px;
}

.dropdown:hover .dropdown-content {
  display: block;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #007bff;
  color: white;
  cursor: pointer;
}

.pagination { text-align:center; margin-top:10px; }
</style>
</head>

<body>

<h2>Contact Manager</h2>

<div class="controls">
  <input type="text" id="search" placeholder="Search...">

  <div class="dropdown">
    <div class="dropdown-btn">Groups</div>
    <div id="groupFilter" class="dropdown-content"></div>
  </div>

  <div class="dropdown">
    <div class="dropdown-btn">Posts</div>
    <div id="postFilter" class="dropdown-content"></div>
  </div>

  <div class="dropdown">
    <div class="dropdown-btn">Status</div>
    <div id="statusFilter" class="dropdown-content"></div>
  </div>

  <button onclick="selectAll()">Select All</button>
  <button onclick="clearAll()">Clear</button>
  <button onclick="exportSelected()">Export</button>
</div>

<table>
<thead>
<tr>
<th></th>
<th onclick="sortTable('name')">Name</th>
<th onclick="sortTable('phones')">Phones</th>
<th onclick="sortTable('email')">Email</th>
<th onclick="sortTable('post')">Post</th>
<th onclick="sortTable('groups')">Groups</th>
<th onclick="sortTable('status')">Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>
</div>

<script>

const SHEET_URL = "https://opensheet.elk.sh/1HAaZ_Vc71R4ewjH_YLOrAtI_O0EjPXeSFuXAopuC9nM/Sheet1";

let contacts = [];
let filteredData = [];
let selectedIds = new Set();
let currentPage = 1;
const perPage = 20;
let currentSort = { key:null, asc:true };

// Parse
function parsePhones(str){
  if(!str) return [];
  return str.split(";").map(p=>{
    const [l,n]=p.split(":");
    return {label:l||"CELL",number:n||""};
  });
}
function parseGroups(str){
  if(!str) return [];
  return str.split(",").map(g=>g.trim());
}

// Load
async function loadData(){
  const res = await fetch(SHEET_URL);
  const data = await res.json();

  contacts = data.map((r,i)=>({
    id:i,
    name:r.Name||"",
    email:r.Email||"",
    post:r.Post||"",
    phones:parsePhones(r.Phones),
    groups:parseGroups(r.Groups),
    status:(r.Status||"").toLowerCase()
  }));

  buildFilters();
  applyFilters();
}

// Build multi filters
function buildFilters(){
  buildCheckbox("groupFilter", [...new Set(contacts.flatMap(c=>c.groups))]);
  buildCheckbox("postFilter", [...new Set(contacts.map(c=>c.post))]);
  buildCheckbox("statusFilter", [...new Set(contacts.map(c=>c.status))]);
}

function buildCheckbox(id, list){
  const div=document.getElementById(id);
  div.innerHTML="";
  list.forEach(val=>{
    div.innerHTML+=`<label><input type="checkbox" value="${val}" onchange="applyFilters()"> ${val}</label>`;
  });
}

// Get selected values
function getSelected(id){
  return [...document.querySelectorAll(`#${id} input:checked`)].map(cb=>cb.value);
}

// Filter
function applyFilters(){
  const search=document.getElementById("search").value.toLowerCase();
  const groups=getSelected("groupFilter");
  const posts=getSelected("postFilter");
  const status=getSelected("statusFilter");

  filteredData = contacts.filter(c=>{
    const matchSearch =
      c.name.toLowerCase().includes(search) ||
      c.phones.some(p=>p.number.includes(search));

    const matchGroup = groups.length===0 || c.groups.some(g=>groups.includes(g));
    const matchPost = posts.length===0 || posts.includes(c.post);
    const matchStatus = status.length===0 || status.includes(c.status);

    return matchSearch && matchGroup && matchPost && matchStatus;
  });

  renderTable();
}

// Sort
function sortTable(key){
  currentSort.asc = currentSort.key===key ? !currentSort.asc : true;
  currentSort.key = key;

  filteredData.sort((a,b)=>{
    let A=a[key], B=b[key];
    if(Array.isArray(A)) A=A.join(",");
    if(Array.isArray(B)) B=B.join(",");
    return currentSort.asc
      ? String(A).localeCompare(String(B))
      : String(B).localeCompare(String(A));
  });

  renderTable();
}

// Render
function renderTable(){
  const tbody=document.getElementById("tableBody");
  tbody.innerHTML="";

  const start=(currentPage-1)*perPage;
  const page=filteredData.slice(start,start+perPage);

  page.forEach(c=>{
    const phones=c.phones.map(p=>p.number).join("<br>");

    tbody.innerHTML+=`
<tr>
<td><input type="checkbox" data-id="${c.id}" ${selectedIds.has(c.id)?"checked":""}></td>
<td>${c.name}</td>
<td>${phones}</td>
<td>${c.email}</td>
<td>${c.post}</td>
<td>${c.groups.join(",")}</td>
<td>${c.status}</td>
<td>
<a href="tel:${c.phones[0]?.number}">📞</a>
<a href="mailto:${c.email}">✉</a>
</td>
</tr>`;
  });

  document.querySelectorAll("input[type=checkbox]").forEach(cb=>{
    cb.onchange=()=>{
      const id=parseInt(cb.dataset.id);
      cb.checked?selectedIds.add(id):selectedIds.delete(id);
    };
  });

  document.getElementById("pageInfo").innerText=
    `Page ${currentPage}/${Math.ceil(filteredData.length/perPage)}`;
}

// Pagination
function nextPage(){ currentPage++; renderTable(); }
function prevPage(){ currentPage--; renderTable(); }

// Select
function selectAll(){ filteredData.forEach(c=>selectedIds.add(c.id)); renderTable();}
function clearAll(){ selectedIds.clear(); renderTable(); }

// Export
function exportSelected(){
  let vcf="";
  contacts.forEach(c=>{
    if(!selectedIds.has(c.id)) return;
    let phones="";
    c.phones.forEach(p=>phones+=`TEL:${p.number}\n`);
    vcf+=`BEGIN:VCARD
VERSION:3.0
FN:${c.name}
${phones}EMAIL:${c.email}
END:VCARD
`;
  });

  if(!vcf) return alert("No contacts selected");

  const blob=new Blob([vcf],{type:"text/vcard"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="contacts.vcf";
  a.click();
}

// Events
document.getElementById("search").oninput=applyFilters;

loadData();

</script>

</body>
</html>
