<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Manager Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding:10px; background:#f4f6f8; }
h2 { text-align:center; }

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

input, select {
  padding:8px;
  min-width:180px;
}

/* table */
table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  font-size:14px;
}

th {
  background:#007bff;
  color:white;
  cursor:pointer;
  position:relative;
}

/* hover row */
tbody tr:hover {
  background:#fff3cd;
}

/* phone */
.phone {
  display:inline-block;
  transition:0.2s;
}

.phone:hover {
  font-size:18px;
  font-weight:bold;
  color:#d11a2a;
  background:#fff3f3;
  padding:2px 4px;
  border-radius:4px;
}

/* pagination */
.pagination {
  margin-top:10px;
  text-align:center;
}

.pagination button {
  padding:6px 10px;
  margin:2px;
  cursor:pointer;
}

/* responsive */
@media(max-width:768px){
  table, thead, tbody, th, td, tr { display:block; }
  thead { display:none; }

  tr {
    margin-bottom:10px;
    background:white;
    border:1px solid #ccc;
    padding:10px;
  }

  td {
    display:flex;
    justify-content:space-between;
    border:none;
    border-bottom:1px solid #eee;
  }

  td::before {
    content: attr(data-label);
    font-weight:bold;
  }
}
</style>
</head>

<body>

<h2>Contact Manager Pro</h2>

<div class="controls">
  <input id="search" placeholder="Search Name / Nepali / Phone">

  <select id="filterPost"><option value="">All Post</option></select>
  <select id="filterStatus"><option value="">All Status</option></select>
  <select id="filterGroup"><option value="">All Groups</option></select>
</div>

<table>
<thead>
<tr>
<th onclick="sort('name')">Name</th>
<th onclick="sort('nepaliName')">Nepali Name</th>
<th>Email</th>
<th>Phones</th>
<th onclick="sort('post')">Post</th>
<th onclick="sort('groups')">Groups</th>
<th onclick="sort('status')">Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<!-- PAGINATION -->
<div class="pagination">
  <button onclick="prevPage()">Prev</button>
  <span id="pageInfo"></span>
  <button onclick="nextPage()">Next</button>
</div>

<script>

const SHEET_URL = "https://opensheet.elk.sh/1HAaZ_Vc71R4ewjH_YLOrAtI_O0EjPXeSFuXAopuC9nM/Sheet1";

let data = [];
let filtered = [];

let currentPage = 1;
const perPage = 10;

let sortKey = "";
let sortAsc = true;

// parse phones
function parsePhones(str){
  if(!str) return [];
  return str.split(";").map(p=>{
    const [l,n]=p.split(":");
    return {label:l||"",number:n||""};
  });
}

// load
async function load(){
  const res = await fetch(SHEET_URL);
  const raw = await res.json();

  data = raw.map(r=>({
    name: r.Name || "",
    nepaliName: r.nepaliName || r.NepaliName || r["Nepali Name"] || "",
    email: r.Email || "",
    phones: parsePhones(r.Phones),
    post: r.Post || "",
    groups: r.Groups || "",
    status: r.Status || ""
  }));

  filtered = data;

  buildFilters();
  render();
}

// filters
function buildFilters(){
  fill("filterPost", [...new Set(data.map(d=>d.post))]);
  fill("filterStatus", [...new Set(data.map(d=>d.status))]);
  fill("filterGroup", [...new Set(data.map(d=>d.groups))]);
}

function fill(id, arr){
  const el=document.getElementById(id);
  arr.forEach(v=>{
    if(v){
      const o=document.createElement("option");
      o.value=v;
      o.textContent=v;
      el.appendChild(o);
    }
  });
}

// filter
function applyFilters(){
  const s=document.getElementById("search").value.toLowerCase();
  const post=document.getElementById("filterPost").value;
  const status=document.getElementById("filterStatus").value;
  const group=document.getElementById("filterGroup").value;

  filtered = data.filter(c=>{

    const matchSearch =
      c.name.toLowerCase().includes(s) ||
      c.nepaliName.toLowerCase().includes(s) ||
      c.phones.some(p=>p.number.includes(s));

    const matchPost = !post || c.post===post;
    const matchStatus = !status || c.status===status;
    const matchGroup = !group || c.groups===group;

    return matchSearch && matchPost && matchStatus && matchGroup;
  });

  currentPage = 1; // reset page
  render();
}

// sort
function sort(key){
  sortAsc = sortKey===key ? !sortAsc : true;
  sortKey = key;

  filtered.sort((a,b)=>{
    let A=a[key]||"", B=b[key]||"";
    return sortAsc
      ? String(A).localeCompare(String(B))
      : String(B).localeCompare(String(A));
  });

  render();
}

// render with pagination
function render(){
  const tbody=document.getElementById("tableBody");
  tbody.innerHTML="";

  const start = (currentPage-1)*perPage;
  const pageData = filtered.slice(start, start+perPage);

  pageData.forEach(c=>{

    const phones = c.phones.map(p=>`
      <div>
        <span class="phone">${p.number}</span>
        <a href="tel:${p.number}">📞</a>
      </div>
    `).join("");

    tbody.innerHTML+=`
<tr>
<td data-label="Name">${c.name}</td>
<td data-label="Nepali Name">${c.nepaliName}</td>
<td data-label="Email">${c.email}</td>
<td data-label="Phones">${phones}</td>
<td data-label="Post">${c.post}</td>
<td data-label="Groups">${c.groups}</td>
<td data-label="Status">${c.status}</td>
</tr>`;
  });

  document.getElementById("pageInfo").innerText =
    `Page ${currentPage} / ${Math.ceil(filtered.length/perPage) || 1}`;
}

// pagination controls
function nextPage(){
  if(currentPage < Math.ceil(filtered.length/perPage)){
    currentPage++;
    render();
  }
}

function prevPage(){
  if(currentPage > 1){
    currentPage--;
    render();
  }
}

// events
document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("filterPost").addEventListener("change", applyFilters);
document.getElementById("filterStatus").addEventListener("change", applyFilters);
document.getElementById("filterGroup").addEventListener("change", applyFilters);

load();

</script>

</body>
</html>
