<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<title>सम्पर्क व्यवस्थापन प्रणाली</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid py-3">

<h3 class="text-center mb-3">📒 सम्पर्क व्यवस्थापन प्रणाली</h3>

<!-- Controls -->
<div class="row g-2 mb-3">

<div class="col-md-3">
<input id="search" class="form-control" placeholder="नाम / नेपाली / फोन खोज्नुहोस्">
</div>

<div class="col-md-2">
<select id="filterPost" class="form-select" multiple></select>
</div>

<div class="col-md-2">
<select id="filterStatus" class="form-select" multiple></select>
</div>

<div class="col-md-2">
<select id="filterGroup" class="form-select" multiple></select>
</div>

<div class="col-md-3 d-flex gap-2 flex-wrap">
<button class="btn btn-primary" onclick="applyFilters()">फिल्टर</button>
<button class="btn btn-secondary" onclick="clearFilters()">हटाउनुहोस्</button>
<button class="btn btn-success" onclick="selectAll()">सबै छान्नुहोस्</button>
<button class="btn btn-warning" onclick="clearAll()">खाली गर्नुहोस्</button>
<button class="btn btn-danger" onclick="exportContacts()">निर्यात</button>
</div>

</div>

<!-- Table -->
<div class="table-responsive">
<table class="table table-bordered table-hover align-middle">

<thead class="table-primary">
<tr>
<th><input type="checkbox" onclick="toggleAll(this)"></th>
<th onclick="sort('name')">नाम</th>
<th onclick="sort('nepaliName')">नेपाली नाम</th>
<th>इमेल</th>
<th>फोन</th>
<th onclick="sort('post')">पद</th>
<th onclick="sort('groups')">समूह</th>
<th onclick="sort('status')">स्थिति</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<!-- Pagination -->
<div class="d-flex justify-content-center align-items-center gap-3">
<button class="btn btn-outline-primary" onclick="prevPage()">अघिल्लो</button>
<span id="pageInfo"></span>
<button class="btn btn-outline-primary" onclick="nextPage()">अर्को</button>
</div>

</div>

<script>

const SHEET_URL = "https://opensheet.elk.sh/1HAaZ_Vc71R4ewjH_YLOrAtI_O0EjPXeSFuXAopuC9nM/Sheet1";

let data = [];
let filtered = [];
let selected = new Set();

let currentPage = 1;
const perPage = 20;

let sortKey="";
let sortAsc=true;

// parse phones
function parsePhones(str){
  if(!str) return [];
  return str.split(";").map(p=>{
    const [l,n]=p.split(":");
    return {label:l||"CELL",number:n||""};
  });
}

// load
async function load(){
  const res = await fetch(SHEET_URL);
  const raw = await res.json();

  data = raw.map((r,i)=>({
    id:i,
    name:r.Name||"",
    nepaliName:r.nepaliName||r["Nepali Name"]||"",
    email:r.Email||"",
    phones:parsePhones(r.Phones),
    post:r.Post||"",
    groups:r.Groups||"",
    status:r.Status||""
  }));

  filtered=data;
  buildFilters();
  render();
}

// filters
function buildFilters(){
  fill("filterPost",[...new Set(data.map(d=>d.post))]);
  fill("filterStatus",[...new Set(data.map(d=>d.status))]);
  fill("filterGroup",[...new Set(data.map(d=>d.groups))]);
}

function fill(id, arr){
  const el=document.getElementById(id);
  arr.forEach(v=>{
    if(v){
      const o=document.createElement("option");
      o.value=v;
      o.textContent=v;
      el.appendChild(o);
    }
  });
}

function getMulti(id){
  return Array.from(document.getElementById(id).selectedOptions).map(o=>o.value);
}

// apply filters
function applyFilters(){
  const s=document.getElementById("search").value.toLowerCase();
  const posts=getMulti("filterPost");
  const status=getMulti("filterStatus");
  const groups=getMulti("filterGroup");

  filtered=data.filter(c=>{
    return (
      (c.name.toLowerCase().includes(s) ||
       c.nepaliName.toLowerCase().includes(s) ||
       c.phones.some(p=>p.number.includes(s)))
      &&
      (posts.length===0 || posts.includes(c.post))
      &&
      (status.length===0 || status.includes(c.status))
      &&
      (groups.length===0 || groups.includes(c.groups))
    );
  });

  currentPage=1;
  render();
}

function clearFilters(){
  document.querySelectorAll("select").forEach(s=>s.selectedIndex=-1);
  applyFilters();
}

// selection
function selectAll(){
  filtered.forEach(c=>selected.add(c.id));
  render();
}

function clearAll(){
  selected.clear();
  render();
}

function toggleAll(cb){
  cb.checked ? selectAll() : clearAll();
}

// sort
function sort(key){
  sortAsc = sortKey===key ? !sortAsc : true;
  sortKey=key;

  filtered.sort((a,b)=>{
    return sortAsc
      ? String(a[key]).localeCompare(String(b[key]))
      : String(b[key]).localeCompare(String(a[key]));
  });

  render();
}

// render
function render(){

  const tbody=document.getElementById("tableBody");
  tbody.innerHTML="";

  const start=(currentPage-1)*perPage;
  const page=filtered.slice(start,start+perPage);

  page.forEach(c=>{

    const phones=c.phones.map(p=>`
      <div>
        <span class="fw-bold">${p.number}</span>
        <a href="tel:${p.number}" class="ms-1">📞</a>
      </div>`).join("");

    tbody.innerHTML+=`
<tr>
<td><input type="checkbox" ${selected.has(c.id)?"checked":""} onclick="toggleSel(${c.id})"></td>
<td>${c.name}</td>
<td>${c.nepaliName}</td>
<td><a href="${emailLink(c.email,c.name)}">✉ इमेल</a></td>
<td>${phones}</td>
<td>${c.post}</td>
<td>${c.groups}</td>
<td>${c.status}</td>
</tr>`;
  });

  document.getElementById("pageInfo").innerText =
    `पृष्ठ ${currentPage} / ${Math.ceil(filtered.length/perPage) || 1}`;
}

function toggleSel(id){
  selected.has(id) ? selected.delete(id) : selected.add(id);
}

// pagination
function nextPage(){
  if(currentPage < Math.ceil(filtered.length/perPage)){
    currentPage++;
    render();
  }
}

function prevPage(){
  if(currentPage>1){
    currentPage--;
    render();
  }
}

// email
function emailLink(email,name){
  const list=email.split(",").map(e=>e.trim()).join(",");
  return `mailto:${list}?subject=सम्पर्क&body=${encodeURIComponent(name+" ज्यू,")}`;
}

// export
function exportContacts(){

  let vcf="";

  data.filter(c=>selected.has(c.id)).forEach(c=>{

    vcf+="BEGIN:VCARD\nVERSION:3.0\n";
    vcf+=`FN:${c.name}\n`;

    c.phones.forEach(p=>{
      vcf+=`TEL;TYPE=CELL:${p.number}\n`;
    });

    if(c.email) vcf+=`EMAIL:${c.email}\n`;

    vcf+="END:VCARD\n\n";
  });

  const blob=new Blob([vcf],{type:"text/vcard"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="contacts.vcf";
  a.click();
}

document.getElementById("search").addEventListener("input",applyFilters);

load();

</script>

</body>
</html>
