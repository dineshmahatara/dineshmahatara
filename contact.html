<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Contact Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding: 10px; background: #f4f6f8; }
h2 { text-align: center; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

input, select, button {
  padding: 8px;
  font-size: 14px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  overflow-x: auto;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #007bff;
  color: white;
}

button {
  background: #28a745;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover { background: #218838; }

.pagination {
  margin-top: 10px;
  text-align: center;
}

/* 📱 Mobile Responsive */
@media(max-width:768px){
  .controls { flex-direction: column; }
  table, thead, tbody, th, td, tr { display: block; }
  th { display:none; }

  tr {
    margin-bottom: 10px;
    border: 1px solid #ccc;
    padding: 8px;
  }

  td {
    border: none;
    display: flex;
    justify-content: space-between;
  }

  td::before {
    font-weight: bold;
  }
}
</style>
</head>

<body>

<h2>Contact Manager</h2>

<div class="controls">
  <input type="text" id="search" placeholder="Search name or phone">

  <select id="groupFilter">
    <option value="">All Groups</option>
  </select>

  <select id="oldNewFilter">
    <option value="">All</option>
    <option value="old">Old</option>
    <option value="new">New</option>
  </select>

  <select id="postFilter">
    <option value="">All Posts</option>
  </select>

  <select id="sortBy">
    <option value="">Sort By</option>
    <option value="name_asc">Name A-Z</option>
    <option value="name_desc">Name Z-A</option>
  </select>

  <button onclick="selectAll()">Select All</button>
  <button onclick="clearAll()">Clear</button>
  <button onclick="exportSelected()">Export</button>
</div>

<div style="overflow-x:auto;">
<table>
<thead>
<tr>
  <th>Select</th>
  <th>Name</th>
  <th>Phones</th>
  <th>Email</th>
  <th>Post</th>
  <th>Groups</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="pagination">
  <button onclick="prevPage()">Prev</button>
  <span id="pageInfo"></span>
  <button onclick="nextPage()">Next</button>
</div>

<script>

const SHEET_URL = "https://opensheet.elk.sh/1HAaZ_Vc71R4ewjH_YLOrAtI_O0EjPXeSFuXAopuC9nM/Sheet1";

let contacts = [];
let filteredData = [];
let selectedIds = new Set();

let currentPage = 1;
const perPage = 20;

const tableBody = document.getElementById("tableBody");

// Search
function matchSearch(text, search) {
  text = text.toLowerCase();
  search = search.toLowerCase();
  return text.includes(search);
}

// Parse
function parsePhones(str) {
  if (!str) return [];
  return str.split(";").map(p => {
    const [label, number] = p.split(":");
    return { label: label || "CELL", number: number || "" };
  });
}

function parseGroups(str) {
  if (!str) return [];
  return str.split(",").map(g => g.trim());
}

// Load data
async function loadData() {
  const res = await fetch(SHEET_URL);
  const data = await res.json();

  contacts = data.map((row, i) => ({
    id: i,
    name: row.Name || "",
    email: row.Email || "",
    post: row.Post || "",
    phones: parsePhones(row.Phones),
    groups: parseGroups(row.Groups),
    type: i < data.length/2 ? "old" : "new"
  }));

  loadFilters();
  applyFilters();
}

// Load filters
function loadFilters() {
  const groups = [...new Set(contacts.flatMap(c => c.groups))];
  const posts = [...new Set(contacts.map(c => c.post))];

  const groupFilter = document.getElementById("groupFilter");
  groups.forEach(g=>{
    let opt=document.createElement("option");
    opt.value=g; opt.textContent=g;
    groupFilter.appendChild(opt);
  });

  const postFilter = document.getElementById("postFilter");
  posts.forEach(p=>{
    let opt=document.createElement("option");
    opt.value=p; opt.textContent=p;
    postFilter.appendChild(opt);
  });
}

// Apply filters
function applyFilters() {
  const search = document.getElementById("search").value;
  const group = document.getElementById("groupFilter").value;
  const post = document.getElementById("postFilter").value;
  const oldNew = document.getElementById("oldNewFilter").value;
  const sort = document.getElementById("sortBy").value;

  filteredData = contacts.filter(c => {
    const matchSearchText =
      matchSearch(c.name, search) ||
      c.phones.some(p => matchSearch(p.number, search));

    const matchGroup = !group || c.groups.includes(group);
    const matchPost = !post || c.post === post;
    const matchType = !oldNew || c.type === oldNew;

    return matchSearchText && matchGroup && matchPost && matchType;
  });

  if (sort === "name_asc") filteredData.sort((a,b)=>a.name.localeCompare(b.name));
  if (sort === "name_desc") filteredData.sort((a,b)=>b.name.localeCompare(a.name));

  currentPage = 1;
  renderTable();
}

// Render
function renderTable() {
  tableBody.innerHTML = "";

  const start = (currentPage - 1) * perPage;
  const pageData = filteredData.slice(start, start + perPage);

  pageData.forEach((c, index) => {
    const phones = c.phones.map(p => p.number).join("<br>");

    tableBody.innerHTML += `
      <tr>
        <td><input type="checkbox" data-id="${c.id}" ${selectedIds.has(c.id)?"checked":""}></td>
        <td>${c.name}</td>
        <td>${phones}</td>
        <td>${c.email}</td>
        <td>${c.post}</td>
        <td>${c.groups.join(", ")}</td>
        <td>
          <a href="tel:${c.phones[0]?.number}">📞</a>
          <a href="mailto:${c.email}">✉</a>
        </td>
      </tr>
    `;
  });

  document.querySelectorAll("input[type=checkbox]").forEach(cb=>{
    cb.onchange = () => {
      const id = parseInt(cb.dataset.id);
      cb.checked ? selectedIds.add(id) : selectedIds.delete(id);
    };
  });

  document.getElementById("pageInfo").innerText =
    `Page ${currentPage} / ${Math.ceil(filteredData.length / perPage)}`;
}

// Pagination
function nextPage(){ currentPage++; renderTable(); }
function prevPage(){ currentPage--; renderTable(); }

// Select
function selectAll() {
  filteredData.forEach(c => selectedIds.add(c.id));
  renderTable();
}
function clearAll() {
  selectedIds.clear();
  renderTable();
}

// Export
function exportSelected() {
  let vcf = "";

  contacts.forEach(c => {
    if (!selectedIds.has(c.id)) return;

    let phones = "";
    c.phones.forEach(p=>{
      phones += `TEL:${p.number}\n`;
    });

    vcf += `BEGIN:VCARD
VERSION:3.0
FN:${c.name}
${phones}EMAIL:${c.email}
END:VCARD
`;
  });

  if (!vcf) return alert("No contacts selected");

  const blob = new Blob([vcf], { type: "text/vcard" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "contacts.vcf";
  a.click();
}

// Events
document.getElementById("search").oninput = applyFilters;
document.getElementById("groupFilter").onchange = applyFilters;
document.getElementById("postFilter").onchange = applyFilters;
document.getElementById("oldNewFilter").onchange = applyFilters;
document.getElementById("sortBy").onchange = applyFilters;

loadData();

</script>

</body>
</html>
