<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding:10px; background:#f4f6f8; }
h2 { text-align:center; }

input { padding:8px; width:100%; max-width:300px; margin-bottom:10px; }

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  font-size:14px;
}

th {
  background:#007bff;
  color:white;
  cursor:pointer;
}

/* row hover */
tbody tr:hover {
  background:#fff3cd;
}

/* phone */
.phone {
  transition:0.2s;
}

.phone:hover {
  font-size:18px;
  font-weight:bold;
  color:#d11a2a;
  background:#fff3f3;
  padding:2px 4px;
  border-radius:4px;
}

/* mobile */
@media(max-width:768px){
  table, thead, tbody, th, td, tr { display:block; }

  thead { display:none; }

  tr {
    margin-bottom:10px;
    background:white;
    border:1px solid #ccc;
    padding:10px;
  }

  td {
    display:flex;
    justify-content:space-between;
    border:none;
    border-bottom:1px solid #eee;
  }

  td::before {
    content: attr(data-label);
    font-weight:bold;
  }
}
</style>
</head>

<body>

<h2>Contact Manager</h2>

<input id="search" placeholder="Search Name / Nepali Name / Phone">

<table>
<thead>
<tr>
<th>Name</th>
<th>Nepali Name</th>
<th>Email</th>
<th>Phones</th>
<th>Post</th>
<th>Groups</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

const SHEET_URL = "https://opensheet.elk.sh/1HAaZ_Vc71R4ewjH_YLOrAtI_O0EjPXeSFuXAopuC9nM/Sheet1";

let contacts = [];
let filtered = [];

// 🔥 Safe phone parser
function parsePhones(str){
  if(!str) return [];
  return str.split(";").map(p=>{
    const [label, number] = p.split(":");
    return {
      label: label || "CELL",
      number: number || ""
    };
  });
}

// 🔥 Load data safely
async function loadData(){
  const res = await fetch(SHEET_URL);
  const raw = await res.json();

  console.log("DEBUG HEADERS:", Object.keys(raw[0])); // helpful debug

  contacts = raw.map(r => ({

    name: r.Name || "",

    // ✅ SAFE Nepali name handling (fixes your issue)
    nepaliName:
      r.nepaliName ||
      r.NepaliName ||
      r["Nepali Name"] ||
      "",

    email: r.Email || "",
    phones: parsePhones(r.Phones),
    post: r.Post || "",
    groups: r.Groups || "",
    status: r.Status || ""
  }));

  filtered = contacts;
  render();
}

// 🔍 SEARCH (includes Nepali Name)
document.getElementById("search").addEventListener("input", function(){
  const s = this.value.toLowerCase();

  filtered = contacts.filter(c =>
    c.name.toLowerCase().includes(s) ||
    c.nepaliName.toLowerCase().includes(s) ||
    c.email.toLowerCase().includes(s) ||
    c.phones.some(p => p.number.includes(s))
  );

  render();
});

// 🧾 Render table
function render(){
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  filtered.forEach(c => {

    const phonesHTML = c.phones.map(p => `
      <div>
        <span class="phone">${p.number}</span>
        <a href="tel:${p.number}">📞</a>
      </div>
    `).join("");

    tbody.innerHTML += `
<tr>
<td data-label="Name">${c.name}</td>
<td data-label="Nepali Name">${c.nepaliName}</td>
<td data-label="Email">${c.email}</td>
<td data-label="Phones">${phonesHTML}</td>
<td data-label="Post">${c.post}</td>
<td data-label="Groups">${c.groups}</td>
<td data-label="Status">${c.status}</td>
</tr>`;
  });
}

// 🚀 INIT
loadData();

</script>

</body>
</html>
