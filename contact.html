<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Contact Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding: 20px; background: #f4f6f8; }
h2 { text-align: center; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 15px;
}

input, select, button { padding: 8px; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 10px;
}

th {
  background: #007bff;
  color: white;
}

button {
  background: #28a745;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover { background: #218838; }

.pagination {
  margin-top: 15px;
  text-align: center;
}
</style>
</head>

<body>

<h2>Contact Manager</h2>

<div class="controls">
  <input type="text" id="search" placeholder="Search name or phone">

  <div id="groupFilterContainer"></div>

  <select id="postFilter">
    <option value="">All Posts</option>
  </select>

  <select id="sortBy">
    <option value="">Sort By</option>
    <option value="name_asc">Name A-Z</option>
    <option value="name_desc">Name Z-A</option>
    <option value="post_asc">Post A-Z</option>
    <option value="post_desc">Post Z-A</option>
  </select>

  <button onclick="selectAll()">Select All</button>
  <button onclick="clearAll()">Clear</button>
  <button onclick="exportSelected()">Export Selected</button>
</div>

<table>
<thead>
<tr>
  <th>Select</th>
  <th>Name</th>
  <th>Phones</th>
  <th>Email</th>
  <th>Post</th>
  <th>Groups</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
  <button onclick="prevPage()">Prev</button>
  <span id="pageInfo"></span>
  <button onclick="nextPage()">Next</button>
</div>

<script>

const SHEET_URL = "https://opensheet.elk.sh/1HAaZ_Vc71R4ewjH_YLOrAtI_O0EjPXeSFuXAopuC9nM/Sheet1";

let contacts = [];
let filteredData = [];
let selectedIds = new Set();

let currentPage = 1;
const perPage = 30;

const tableBody = document.getElementById("tableBody");
const groupContainer = document.getElementById("groupFilterContainer");
const postFilter = document.getElementById("postFilter");
const sortBy = document.getElementById("sortBy");

// 🔍 Smart search
function matchSearch(text, search) {
  text = text.toLowerCase();
  search = search.toLowerCase();

  if (text.includes(search)) return true;

  let i = 0;
  for (let char of text) {
    if (char === search[i]) i++;
  }
  return i === search.length;
}

// Parse phones
function parsePhones(str) {
  if (!str) return [];
  return str.split(";").map(p => {
    const [label, number] = p.split(":");
    return { label: label?.trim() || "CELL", number: number?.trim() || "" };
  });
}

// Parse groups
function parseGroups(str) {
  if (!str) return [];
  return str.split(",").map(g => g.trim());
}

// Load data
async function loadData() {
  const res = await fetch(SHEET_URL);
  const data = await res.json();

  contacts = data.map(row => ({
    name: row.Name || "",
    email: row.Email || "",
    post: row.Post || "",
    phones: parsePhones(row.Phones),
    groups: parseGroups(row.Groups)
  }));

  loadGroups();
  loadPosts();
  applyFilters();
}

// Groups UI
function loadGroups() {
  const groups = [...new Set(contacts.flatMap(c => c.groups))];

  groupContainer.innerHTML = "";
  groups.forEach(g => {
    const label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" value="${g}" class="groupCheck"> ${g}`;
    groupContainer.appendChild(label);
  });

  document.querySelectorAll(".groupCheck").forEach(cb =>
    cb.addEventListener("change", applyFilters)
  );
}

// Posts UI
function loadPosts() {
  const posts = [...new Set(contacts.map(c => c.post))];

  postFilter.innerHTML = `<option value="">All Posts</option>`;
  posts.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p;
    postFilter.appendChild(opt);
  });
}

// Apply filters
function applyFilters() {
  const search = document.getElementById("search").value;

  const selectedGroups = [...document.querySelectorAll(".groupCheck:checked")].map(cb => cb.value);
  const selectedPost = postFilter.value;
  const sort = sortBy.value;

  filteredData = contacts.filter(c => {
    const matchName = matchSearch(c.name, search);
    const matchPhone = c.phones.some(p => matchSearch(p.number, search));

    const matchGroup = selectedGroups.length === 0 || c.groups.some(g => selectedGroups.includes(g));
    const matchPost = selectedPost === "" || c.post === selectedPost;

    return (matchName || matchPhone) && matchGroup && matchPost;
  });

  if (sort === "name_asc") filteredData.sort((a,b)=>a.name.localeCompare(b.name));
  if (sort === "name_desc") filteredData.sort((a,b)=>b.name.localeCompare(a.name));
  if (sort === "post_asc") filteredData.sort((a,b)=>a.post.localeCompare(b.post));
  if (sort === "post_desc") filteredData.sort((a,b)=>b.post.localeCompare(a.post));

  currentPage = 1;
  renderTable();
}

// Render table
function renderTable() {
  tableBody.innerHTML = "";

  const start = (currentPage - 1) * perPage;
  const pageData = filteredData.slice(start, start + perPage);

  pageData.forEach((c, index) => {
    const globalIndex = start + index;

    const phones = c.phones.map(p => `${p.label}: ${p.number}`).join("<br>");
    const groups = c.groups.join(", ");

    tableBody.innerHTML += `
      <tr>
        <td>
          <input type="checkbox" class="selectBox"
            data-id="${globalIndex}"
            ${selectedIds.has(globalIndex) ? "checked" : ""}>
        </td>
        <td>${c.name}</td>
        <td>${phones}</td>
        <td>${c.email}</td>
        <td>${c.post}</td>
        <td>${groups}</td>
      </tr>
    `;
  });

  // Track checkbox change
  document.querySelectorAll(".selectBox").forEach(cb => {
    cb.addEventListener("change", function () {
      const id = parseInt(this.dataset.id);
      if (this.checked) selectedIds.add(id);
      else selectedIds.delete(id);
    });
  });

  document.getElementById("pageInfo").innerText =
    `Page ${currentPage} / ${Math.ceil(filteredData.length / perPage)}`;
}

// Pagination
function nextPage() {
  if (currentPage < Math.ceil(filteredData.length / perPage)) {
    currentPage++;
    renderTable();
  }
}

function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    renderTable();
  }
}

// Selection
function selectAll() {
  const start = (currentPage - 1) * perPage;
  const pageData = filteredData.slice(start, start + perPage);

  pageData.forEach((_, index) => {
    selectedIds.add(start + index);
  });

  renderTable();
}

function clearAll() {
  const start = (currentPage - 1) * perPage;
  const pageData = filteredData.slice(start, start + perPage);

  pageData.forEach((_, index) => {
    selectedIds.delete(start + index);
  });

  renderTable();
}

// Export
function exportSelected() {
  let vcf = "";

  selectedIds.forEach(id => {
    const c = filteredData[id];
    if (!c) return;

    let phones = "";
    c.phones.forEach(p => {
      phones += `TEL;TYPE=${p.label}:${p.number}\n`;
    });

    vcf += `BEGIN:VCARD
VERSION:3.0
FN:${c.name}
${phones}EMAIL:${c.email}
CATEGORIES:${c.groups.join(",")}
END:VCARD
`;
  });

  if (!vcf) {
    alert("No contacts selected!");
    return;
  }

  const blob = new Blob([vcf], { type: "text/vcard" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "contacts.vcf";
  a.click();
}

// Events
document.getElementById("search").addEventListener("input", applyFilters);
postFilter.addEventListener("change", applyFilters);
sortBy.addEventListener("change", applyFilters);

// Init
loadData();

</script>

</body>
</html>
