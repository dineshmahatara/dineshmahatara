<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Contact Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding: 10px; background: #f4f6f8; }
h2 { text-align:center; }

.controls {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

input, button {
  padding:8px;
}

.dropdown { position:relative; }

.dropdown button {
  background:#007bff;
  color:white;
  border:none;
  cursor:pointer;
}

.dropdown-content {
  display:none;
  position:absolute;
  background:white;
  border:1px solid #ccc;
  max-height:250px;
  overflow:auto;
  z-index:1000;
  padding:8px;
  min-width:180px;
}

.dropdown-content label {
  display:block;
  padding:4px;
}

/* ✅ Phone hover effect */
.phone {
  transition: all 0.2s ease;
  display:inline-block;
}

.phone:hover {
  font-size:18px;
  font-weight:bold;
  color:#d11a2a;
  background:#fff3f3;
  padding:2px 4px;
  border-radius:4px;
}

/* ✅ Row hover highlight */
tbody tr {
  transition: background 0.2s ease;
}

tbody tr:hover {
  background:#fff3cd;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  font-size:14px;
}

th {
  background:#007bff;
  color:white;
  cursor:pointer;
}

.pagination { text-align:center; margin-top:10px; }

/* ✅ Mobile improved layout */
@media(max-width:768px){

  table, thead, tbody, th, td, tr {
    display:block;
  }

  thead {
    display:none;
  }

  tr {
    margin-bottom:10px;
    border:1px solid #ccc;
    padding:10px;
    border-radius:6px;
    background:white;
  }

  td {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
    font-size:14px;
    border:none;
    border-bottom:1px solid #eee;
  }

  td:last-child {
    border-bottom:none;
  }

  td::before {
    content: attr(data-label);
    font-weight:bold;
    color:#555;
  }

  td:first-child {
    justify-content:flex-start;
  }
}
</style>
</head>

<body>

<h2>Contact Manager</h2>

<div class="controls">
  <input type="text" id="search" placeholder="Search...">

  <div class="dropdown">
    <button onclick="toggleDropdown('groupFilter')">Groups ▼</button>
    <div id="groupFilter" class="dropdown-content"></div>
  </div>

  <div class="dropdown">
    <button onclick="toggleDropdown('postFilter')">Posts ▼</button>
    <div id="postFilter" class="dropdown-content"></div>
  </div>

  <div class="dropdown">
    <button onclick="toggleDropdown('statusFilter')">Status ▼</button>
    <div id="statusFilter" class="dropdown-content"></div>
  </div>

  <button onclick="selectAll()">Select All</button>
  <button onclick="clearAll()">Clear</button>
  <button onclick="exportSelected()">Export</button>
</div>

<table>
<thead>
<tr>
<th></th>
<th onclick="sortTable('name')">Name</th>
<th onclick="sortTable('phones')">Phones</th>
<th onclick="sortTable('email')">Email</th>
<th onclick="sortTable('post')">Post</th>
<th onclick="sortTable('groups')">Groups</th>
<th onclick="sortTable('status')">Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>
</div>

<script>

const SHEET_URL = "https://opensheet.elk.sh/1HAaZ_Vc71R4ewjH_YLOrAtI_O0EjPXeSFuXAopuC9nM/Sheet1";

let contacts = [];
let filteredData = [];
let selectedIds = new Set();
let currentPage = 1;
const perPage = 20;
let currentSort = {key:null, asc:true};

// Toggle dropdown
function toggleDropdown(id){
  document.querySelectorAll(".dropdown-content").forEach(d=>{
    if(d.id !== id) d.style.display="none";
  });
  const el=document.getElementById(id);
  el.style.display = el.style.display==="block"?"none":"block";
}

// Parse
function parsePhones(str){
  if(!str) return [];
  return str.split(";").map(p=>{
    const [l,n]=p.split(":");
    return {label:l||"CELL",number:n||""};
  });
}
function parseGroups(str){
  if(!str) return [];
  return str.split(",").map(g=>g.trim());
}

// Load data
async function loadData(){
  const res = await fetch(SHEET_URL);
  const data = await res.json();

  contacts = data.map((r,i)=>({
    id:i,
    name:r.Name||"",
    email:r.Email||"",
    post:r.Post||"",
    phones:parsePhones(r.Phones),
    groups:parseGroups(r.Groups),
    status:(r.Status||"").toLowerCase()
  }));

  buildFilters();
  applyFilters();
}

// Build filters
function buildFilters(){
  buildCheckbox("groupFilter",[...new Set(contacts.flatMap(c=>c.groups))]);
  buildCheckbox("postFilter",[...new Set(contacts.map(c=>c.post))]);
  buildCheckbox("statusFilter",[...new Set(contacts.map(c=>c.status))]);
}

// Instant filter checkboxes
function buildCheckbox(id,list){
  const div=document.getElementById(id);
  div.innerHTML="";

  list.forEach(val=>{
    const clean=val.trim();

    const label=document.createElement("label");
    label.innerHTML=`
      <input type="checkbox" value="${clean}">
      ${clean}
    `;

    label.querySelector("input").addEventListener("change", ()=>{
      applyFilters();
    });

    div.appendChild(label);
  });
}

// Get selected
function getSelected(id){
  return [...document.querySelectorAll(`#${id} input:checked`)]
    .map(cb=>cb.value.toLowerCase());
}

// Apply filters
function applyFilters(){
  const search=document.getElementById("search").value.toLowerCase();

  const groups=getSelected("groupFilter");
  const posts=getSelected("postFilter");
  const status=getSelected("statusFilter");

  filteredData = contacts.filter(c=>{
    const matchSearch =
      c.name.toLowerCase().includes(search) ||
      c.phones.some(p=>p.number.includes(search));

    const matchGroup =
      groups.length===0 || c.groups.some(g=>groups.includes(g.toLowerCase()));

    const matchPost =
      posts.length===0 || posts.includes(c.post.toLowerCase());

    const matchStatus =
      status.length===0 || status.includes(c.status.toLowerCase());

    return matchSearch && matchGroup && matchPost && matchStatus;
  });

  currentPage=1;
  renderTable();
}

// Sort
function sortTable(key){
  currentSort.asc = currentSort.key===key ? !currentSort.asc : true;
  currentSort.key = key;

  filteredData.sort((a,b)=>{
    let A=a[key], B=b[key];
    if(Array.isArray(A)) A=A.join(",");
    if(Array.isArray(B)) B=B.join(",");
    return currentSort.asc
      ? String(A).localeCompare(String(B))
      : String(B).localeCompare(String(A));
  });

  renderTable();
}

// Render
function renderTable(){
  const tbody=document.getElementById("tableBody");
  tbody.innerHTML="";

  const start=(currentPage-1)*perPage;
  const page=filteredData.slice(start,start+perPage);

  page.forEach(c=>{
    const phones = c.phones.map(p =>
      `<span class="phone">${p.number}</span>`
    ).join("<br>");

    tbody.innerHTML+=`
<tr>
<td data-label="Select">
  <input type="checkbox" data-id="${c.id}" ${selectedIds.has(c.id)?"checked":""}>
</td>

<td data-label="Name">${c.name}</td>

<td data-label="Phones">${phones}</td>

<td data-label="Email">${c.email}</td>

<td data-label="Post">${c.post}</td>

<td data-label="Groups">${c.groups.join(", ")}</td>

<td data-label="Status">${c.status}</td>

<td data-label="Action">
  <a href="tel:${c.phones[0]?.number}">📞</a>
  <a href="mailto:${c.email}">✉</a>
</td>
</tr>`;
  });

  document.querySelectorAll("input[type=checkbox]").forEach(cb=>{
    cb.onchange=()=>{
      const id=parseInt(cb.dataset.id);
      cb.checked?selectedIds.add(id):selectedIds.delete(id);
    };
  });

  document.getElementById("pageInfo").innerText=
    `Page ${currentPage}/${Math.ceil(filteredData.length/perPage)}`;
}

// Pagination
function nextPage(){
  if(currentPage < Math.ceil(filteredData.length/perPage)){
    currentPage++;
    renderTable();
  }
}
function prevPage(){
  if(currentPage>1){
    currentPage--;
    renderTable();
  }
}

// Select
function selectAll(){
  filteredData.forEach(c=>selectedIds.add(c.id));
  renderTable();
}
function clearAll(){
  selectedIds.clear();
  renderTable();
}

// Export
function exportSelected(){
  let vcf="";
  contacts.forEach(c=>{
    if(!selectedIds.has(c.id)) return;

    let phones="";
    c.phones.forEach(p=>{
      phones+=`TEL:${p.number}\n`;
    });

    vcf+=`BEGIN:VCARD
VERSION:3.0
FN:${c.name}
${phones}EMAIL:${c.email}
END:VCARD
`;
  });

  if(!vcf) return alert("No contacts selected");

  const blob=new Blob([vcf],{type:"text/vcard"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="contacts.vcf";
  a.click();
}

// Events
document.getElementById("search").oninput=applyFilters;

// Init
loadData();

</script>

</body>
</html>
