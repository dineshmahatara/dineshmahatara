<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Contact Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding: 10px; background: #f4f6f8; }
h2 { text-align:center; }

.controls {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

input, button { padding:8px; }

.dropdown { position:relative; }

.dropdown button {
  background:#007bff;
  color:white;
  border:none;
  cursor:pointer;
}

.dropdown-content {
  display:none;
  position:absolute;
  background:white;
  border:1px solid #ccc;
  max-height:250px;
  overflow:auto;
  z-index:1000;
  padding:8px;
  min-width:180px;
}

.dropdown-content label {
  display:block;
  padding:4px;
}

/* Phone display */
.phone-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  margin-bottom:3px;
}

.phone {
  transition: all 0.2s ease;
}

.phone:hover {
  font-size:18px;
  font-weight:bold;
  color:#d11a2a;
  background:#fff3f3;
  padding:2px 4px;
  border-radius:4px;
}

.call-btn {
  text-decoration:none;
  font-size:16px;
}

/* Row hover */
tbody tr:hover {
  background:#fff3cd;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
  font-size:14px;
}

th {
  background:#007bff;
  color:white;
  cursor:pointer;
}

.pagination { text-align:center; margin-top:10px; }

/* Mobile */
@media(max-width:768px){
  table, thead, tbody, th, td, tr { display:block; }
  thead { display:none; }

  tr {
    margin-bottom:10px;
    border:1px solid #ccc;
    padding:10px;
    border-radius:6px;
    background:white;
  }

  td {
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border:none;
    border-bottom:1px solid #eee;
  }

  td:last-child { border-bottom:none; }

  td::before {
    content: attr(data-label);
    font-weight:bold;
    color:#555;
  }
}
</style>
</head>

<body>

<h2>Contact Manager</h2>

<div class="controls">
  <input type="text" id="search" placeholder="Search...">

  <div class="dropdown">
    <button onclick="toggleDropdown('groupFilter')">Groups ▼</button>
    <div id="groupFilter" class="dropdown-content"></div>
  </div>

  <div class="dropdown">
    <button onclick="toggleDropdown('postFilter')">Posts ▼</button>
    <div id="postFilter" class="dropdown-content"></div>
  </div>

  <div class="dropdown">
    <button onclick="toggleDropdown('statusFilter')">Status ▼</button>
    <div id="statusFilter" class="dropdown-content"></div>
  </div>

  <button onclick="selectAll()">Select All</button>
  <button onclick="clearAll()">Clear</button>
  <button onclick="exportSelected()">Export</button>
</div>

<table>
<thead>
<tr>
<th></th>
<th onclick="sortTable('name')">Name</th>
<th>Phones</th>
<th>Email</th>
<th>Post</th>
<th>Groups</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
<button onclick="prevPage()">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>
</div>

<script>

const SHEET_URL = "https://opensheet.elk.sh/1HAaZ_Vc71R4ewjH_YLOrAtI_O0EjPXeSFuXAopuC9nM/Sheet1";

let contacts = [];
let filteredData = [];
let selectedIds = new Set();
let currentPage = 1;
const perPage = 20;

// Dropdown
function toggleDropdown(id){
  document.querySelectorAll(".dropdown-content").forEach(d=>{
    if(d.id !== id) d.style.display="none";
  });
  const el=document.getElementById(id);
  el.style.display = el.style.display==="block"?"none":"block";
}

// Parse
function parsePhones(str){
  if(!str) return [];
  return str.split(";").map(p=>{
    const [l,n]=p.split(":");
    return {label:l||"CELL",number:n||""};
  });
}

// Load
async function loadData(){
  const res = await fetch(SHEET_URL);
  const data = await res.json();

  contacts = data.map((r,i)=>({
    id:i,
    name:r.Name||"",
    email:r.Email||"",
    post:r.Post||"",
    phones:parsePhones(r.Phones),
    groups:(r.Groups||"").split(","),
    status:(r.Status||"").toLowerCase()
  }));

  filteredData = contacts;
  renderTable();
}

// Render
function renderTable(){
  const tbody=document.getElementById("tableBody");
  tbody.innerHTML="";

  const start=(currentPage-1)*perPage;
  const page=filteredData.slice(start,start+perPage);

  page.forEach(c=>{

    const phonesHTML = c.phones.map(p=>`
      <div class="phone-row">
        <span class="phone">${p.number}</span>
        <a class="call-btn" href="tel:${p.number}">📞</a>
      </div>
    `).join("");

    tbody.innerHTML+=`
<tr>
<td data-label="Select">
<input type="checkbox" data-id="${c.id}">
</td>

<td data-label="Name">${c.name}</td>

<td data-label="Phones">${phonesHTML}</td>

<td data-label="Email">${c.email}</td>

<td data-label="Post">${c.post}</td>

<td data-label="Groups">${c.groups.join(", ")}</td>

<td data-label="Status">${c.status}</td>

<td data-label="Action">
<a href="mailto:${c.email}">✉</a>
</td>
</tr>`;
  });
}

// Pagination
function nextPage(){ currentPage++; renderTable(); }
function prevPage(){ currentPage--; renderTable(); }

// Init
loadData();

</script>

</body>
</html>
